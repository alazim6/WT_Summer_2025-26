<!DOCTYPE html>
<html>  
<Head>
<title>Internship Confirmation Form</title>
</Head>
<body>
<h2>Internship Confirmation Form</h2>

<form>
<label>Student Name:</label><br>
<input type="text" name="studentName" required><br><br>

<label>Email Address:</label><br>
<input type="email" name="email" required><br><br>

<label>Preferred Internship Type:</label><br>
<input type="radio" name="internshipType" value="On-Site"> On-Site
<input type="radio" name="internshipType" value="Remote"> Remote<br><br>
<label>Internship Duration:</label><br>
<select name="duration">
    <option>6 Weeks</option>
    <option>3 Months</option>
</select><br><br>
<label>Skills of Interest:</label><br>
<input type="checkbox" name="skills" value="Web Development"> Web Development<br>
<input type="checkbox" name="skills" value="Data Analysis"> Data Analysis<br>
<input type="checkbox" name="skills" value="Mobile Apps"> Mobile Apps<br><br>
<input type="submit" value="Submit">
</form>
</body>

</html>
